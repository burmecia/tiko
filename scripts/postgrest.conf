# PostgREST base config (baked into the rootfs).
#
# One PostgREST per VM, co-located in the guest next to Postgres and spawned by
# the tikoguest `PostgRest` service (same lifecycle model as PG via pg_ctl — no
# systemd unit). Tikoguest owns start/stop/reload; freeze/thaw snapshots and
# resumes it with the rest of the VM.
#
# Trust-the-TAP-subnet model: requests are anonymous (no JWT yet). PostgREST
# connects as the `authenticator` login role (trust auth on the local subnet —
# see pg_hba.conf) and impersonates `anon` for unauthenticated requests. Role
# provisioning lives in postgrest_setup.sql, run by the service before start.
#
# Per-VM overrides (e.g. jwt-secret when JWT lands) are applied via the
# PostgREST `PGRST_*` environment variables at spawn time rather than rewriting
# this file — see the `PostgRest` service in tikoguest.

# Connect to the in-guest Postgres over loopback (trust auth). The app database
# is `postgres` (the only user database on a Tiko VM; `tt` is the PGDATA dir
# name, not a database). Roles are cluster-wide; the setup SQL runs against this
# same database so the `NOTIFY pgrst` event trigger lands here too.
db-uri = "postgresql://authenticator@localhost:5432/postgres"

# Expose the public schema; anonymous requests run as the `anon` role.
db-schemas = "public"
db-anon-role = "anon"

# Bind all interfaces so the host-side tikod HTTP proxy (0.0.0.0:3000) can reach
# PostgREST via the guest's external IP — same bind model as the tikoguest agent
# (0.0.0.0:9000). The TAP subnet (172.16.0.0/16) is trusted by pg_hba.conf, so
# this matches the trust-the-TAP-subnet model. The PostgREST→PG connection
# above stays on localhost.
server-host = "0.0.0.0"
server-port = 3000

log-level = "info"

# JWT deferred — enable by setting PGRST_JWT_SECRET in the service when wiring
# authenticated requests:
# jwt-secret = "..."
